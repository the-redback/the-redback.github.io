<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <rect width="1200" height="800" fill="#44403c"/>

  <!-- Scattered contest photos (polaroid style) -->
  <!-- Photo 1 — top left, tilted -->
  <g transform="translate(80, 80) rotate(-12, 100, 80)">
    <rect x="0" y="0" width="200" height="160" rx="4" fill="#fff" opacity="0.9"/>
    <rect x="10" y="10" width="180" height="120" rx="2" fill="#6366f1"/>
    <text x="100" y="75" font-family="Arial,sans-serif" font-size="16" fill="#fff" text-anchor="middle">ICPC Regionals</text>
    <text x="100" y="150" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">2018</text>
  </g>

  <!-- Photo 2 — top center-right, slight tilt -->
  <g transform="translate(520, 40) rotate(5, 100, 80)">
    <rect x="0" y="0" width="200" height="160" rx="4" fill="#fff" opacity="0.9"/>
    <rect x="10" y="10" width="180" height="120" rx="2" fill="#f97316"/>
    <text x="100" y="75" font-family="Arial,sans-serif" font-size="16" fill="#fff" text-anchor="middle">CodeForces</text>
    <text x="100" y="150" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">Contest Day</text>
  </g>

  <!-- Photo 3 — top right, tilted -->
  <g transform="translate(880, 100) rotate(-8, 100, 80)">
    <rect x="0" y="0" width="200" height="160" rx="4" fill="#fff" opacity="0.85"/>
    <rect x="10" y="10" width="180" height="120" rx="2" fill="#10b981"/>
    <text x="100" y="75" font-family="Arial,sans-serif" font-size="16" fill="#fff" text-anchor="middle">Team Practice</text>
    <text x="100" y="150" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">Lab Session</text>
  </g>

  <!-- Photo 4 — middle left -->
  <g transform="translate(30, 340) rotate(7, 100, 80)">
    <rect x="0" y="0" width="200" height="160" rx="4" fill="#fff" opacity="0.85"/>
    <rect x="10" y="10" width="180" height="120" rx="2" fill="#ef4444"/>
    <text x="100" y="75" font-family="Arial,sans-serif" font-size="16" fill="#fff" text-anchor="middle">ICPC Dhaka</text>
    <text x="100" y="150" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">Regional 2017</text>
  </g>

  <!-- Photo 5 — center -->
  <g transform="translate(420, 300) rotate(-4, 100, 80)">
    <rect x="0" y="0" width="220" height="175" rx="4" fill="#fff" opacity="0.95"/>
    <rect x="10" y="10" width="200" height="130" rx="2" fill="#8b5cf6"/>
    <text x="110" y="70" font-family="Arial,sans-serif" font-size="18" fill="#fff" text-anchor="middle" font-weight="bold">🏆</text>
    <text x="110" y="95" font-family="Arial,sans-serif" font-size="14" fill="#fff" text-anchor="middle">National Finals</text>
    <text x="110" y="160" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">Award Ceremony</text>
  </g>

  <!-- Photo 6 — right side -->
  <g transform="translate(830, 370) rotate(10, 100, 80)">
    <rect x="0" y="0" width="200" height="160" rx="4" fill="#fff" opacity="0.85"/>
    <rect x="10" y="10" width="180" height="120" rx="2" fill="#3b82f6"/>
    <text x="100" y="75" font-family="Arial,sans-serif" font-size="16" fill="#fff" text-anchor="middle">Hackathon</text>
    <text x="100" y="150" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">Weekend Jam</text>
  </g>

  <!-- Photo 7 — bottom left -->
  <g transform="translate(160, 580) rotate(-6, 100, 80)">
    <rect x="0" y="0" width="200" height="160" rx="4" fill="#fff" opacity="0.8"/>
    <rect x="10" y="10" width="180" height="120" rx="2" fill="#ec4899"/>
    <text x="100" y="75" font-family="Arial,sans-serif" font-size="16" fill="#fff" text-anchor="middle">NCPC 2019</text>
    <text x="100" y="150" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">Team Photo</text>
  </g>

  <!-- Photo 8 — bottom right -->
  <g transform="translate(700, 560) rotate(3, 100, 80)">
    <rect x="0" y="0" width="200" height="160" rx="4" fill="#fff" opacity="0.8"/>
    <rect x="10" y="10" width="180" height="120" rx="2" fill="#14b8a6"/>
    <text x="100" y="75" font-family="Arial,sans-serif" font-size="16" fill="#fff" text-anchor="middle">Online Judge</text>
    <text x="100" y="150" font-family="Arial,sans-serif" font-size="11" fill="#666" text-anchor="middle">1100+ Solved</text>
  </g>

  <!-- Title overlay -->
  <text x="600" y="420" font-family="Arial,sans-serif" font-size="42" fill="#fdba74" text-anchor="middle" font-weight="bold" opacity="0.9">🏆 Competitive Programming</text>
</svg>
